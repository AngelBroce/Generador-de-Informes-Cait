<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Conclusiones – CAIT Informes</title>
<script src="/static/js/tailwind.js?plugins=forms,container-queries"></script>
<!-- Offline Fonts Enabled -->
<!-- Offline Fonts Enabled -->
<script src="/static/js/ui-components.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{extend:{
      colors:{
        "background":"#fcf9f8","surface":"#fcf9f8",
        "surface-container-lowest":"#ffffff","surface-container-low":"#f6f3f2",
        "surface-container":"#f0eded","surface-container-high":"#eae7e7",
        "on-surface":"#1b1c1c","on-surface-variant":"#41493e",
        "outline":"#717a6d","outline-variant":"#c0c9bb",
        "primary":"#00450d","on-primary":"#ffffff","primary-container":"#1b5e20","on-primary-container":"#90d689",
        "secondary":"#1b6d24","on-secondary":"#ffffff","secondary-container":"#a0f399","on-secondary-container":"#217128",
        "error":"#ba1a1a","on-error":"#ffffff","error-container":"#ffdad6"
      },
      spacing:{"xs":"4px","sm":"8px","md":"16px","lg":"24px","xl":"32px","margin":"24px","gutter":"16px"},
      borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem","xl":"0.75rem","full":"9999px"},
      fontFamily:{"sans":["Inter","sans-serif"]},
      fontSize:{
        "headline-lg":["30px",{lineHeight:"38px",letterSpacing:"-0.02em",fontWeight:"700"}],
        "headline-sm":["20px",{lineHeight:"28px",fontWeight:"600"}],
        "body-md":["14px",{lineHeight:"20px",fontWeight:"400"}],
        "body-sm":["12px",{lineHeight:"16px",fontWeight:"400"}],
        "label-bold":["12px",{lineHeight:"16px",letterSpacing:"0.05em",fontWeight:"700"}]
      }
    }}
  }
</script>
<style>
  *{font-family:'Inter',sans-serif;box-sizing:border-box;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;vertical-align:middle;}
  .nav-active{background-color:#eae7e7;color:#00450d;font-weight:700;}
  .nav-item{color:#41493e;}
  .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;opacity:0;}
  .toast.show{opacity:1;}
  .toast.success{background:#1b5e20;color:#fff;}
  .toast.error{background:#ba1a1a;color:#fff;}
</style>
<link rel="stylesheet" href="/static/js/offline-fonts.css">
</head>
<body class="bg-background text-on-surface" style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">

<!-- ====== TOP APP BAR (IDÉNTICO EN TODAS LAS PÁGINAS) ====== -->
<header id="header-container"></header>

<!-- ====== BODY ROW ====== -->
<div style="display:flex;flex:1;overflow:hidden;">

  <!-- === SIDEBAR (GENERADO DINÁMICAMENTE POR ui-components.js) === -->
  <aside id="sidebar-container" style="width:256px;" class="hidden md:flex flex-col bg-surface-container-low border-r border-outline-variant py-4 overflow-y-auto shrink-0"></aside>

  <!-- === MAIN CONTENT === -->
  <main style="flex:1;overflow-y:auto;" class="bg-background p-lg">
    <div class="max-w-5xl mx-auto">

      <div class="mb-8 border-l-4 border-primary pl-5 py-1">
        <h1 class="text-headline-lg text-on-surface">Conclusión</h1>
        <p class="text-on-surface-variant text-body-md mt-1">Ingrese el diagnóstico grupal y la conclusión técnica final.</p>
      </div>
          <div class="grid grid-cols-1 md:grid-cols-12 gap-6">

        <!-- Columna principal (conclusión) -->
        <div class="md:col-span-8 flex flex-col gap-6">

          <!-- Conclusión del informe -->
          <div class="bg-surface border border-outline-variant rounded-xl overflow-hidden shadow-sm">
            <div class="p-4 border-b border-outline-variant bg-surface-container-low flex items-center justify-between">
              <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary" style="font-size:20px;">edit_note</span>
                <h2 class="text-xs font-bold text-on-surface uppercase tracking-wider">Conclusión</h2>
              </div>
              <button id="btn-regenerate" class="flex items-center gap-1 px-3 py-1 text-xs font-bold text-primary hover:bg-surface-container transition-colors rounded-lg">
                <span class="material-symbols-outlined" style="font-size:16px;">auto_fix</span> Regenerar automático
              </button>
            </div>
            <div class="p-5">
              <textarea id="conclusion-text" rows="18" placeholder="Escriba la conclusión general del informe clínico..." class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-3 text-base focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all resize-none"></textarea>
              
              <div class="flex flex-wrap gap-2 mt-4 pt-4 border-t border-outline-variant">
                <button id="btn-save-template-dialog" class="flex items-center gap-1 px-4 py-2 text-xs font-bold text-on-primary bg-primary rounded-lg hover:opacity-90 transition-opacity">
                  <span class="material-symbols-outlined" style="font-size:16px;">save</span> Guardar como plantilla
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Columna lateral: Plantillas -->
        <div class="md:col-span-4 flex flex-col gap-6">
          <div class="bg-surface border border-outline-variant rounded-xl overflow-hidden shadow-sm">
            <div class="p-4 border-b border-outline-variant bg-surface-container-low flex items-center gap-2">
              <span class="material-symbols-outlined text-primary" style="font-size:20px;">folder_special</span>
              <h2 class="text-xs font-bold text-on-surface uppercase tracking-wider">Mis Plantillas</h2>
            </div>
            <div id="templates-list" class="p-2 flex flex-col gap-2 max-h-[500px] overflow-y-auto">
              <p class="text-xs text-outline text-center py-4 italic">Cargando plantillas...</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<!-- Modal para guardar plantilla -->
<div id="modal-template" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[10000] p-4">
  <div class="bg-surface w-full max-w-md rounded-xl shadow-xl overflow-hidden">
    <div class="p-4 border-b border-outline-variant bg-surface-container-low font-bold">Nueva Plantilla</div>
    <div class="p-5 flex flex-col gap-4">
      <div>
        <label class="text-xs font-bold text-outline uppercase block mb-1">Nombre de la plantilla</label>
        <input id="template-name" type="text" placeholder="Ej. Conclusión estándar" class="w-full h-10 px-3 border border-outline-variant rounded-lg outline-none focus:border-primary"/>
      </div>
      <div class="flex justify-end gap-2 mt-2">
        <button id="btn-cancel-modal" class="px-4 py-2 text-sm font-bold text-outline hover:bg-surface-container rounded-lg">Cancelar</button>
        <button id="btn-confirm-save-template" class="px-4 py-2 text-sm font-bold text-on-primary bg-primary rounded-lg hover:opacity-90">Guardar</button>
      </div>
    </div>
  </div>
</div>

<script>
  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(()=>t.classList.remove('show'), 2800);
  }

  let saveTimer = null;
  function scheduleAutoSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => saveAll(true), 1000);
  }

  async function saveAll(showIndicator = false) {
    try {
      const existing = await fetch('/api/report').then(r => r.json()).catch(()=>({}));
      const val = document.getElementById('conclusion-text').value;
      const data = { ...existing, conclusion_text: val };
      await fetch('/api/report', {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)
      });
      if (!showIndicator) showToast('Borrador guardado correctamente ✓');
    } catch(e) { console.error(e); }
  }

  async function loadData() {
    try {
      const report = await fetch('/api/report').then(r => r.json()).catch(()=>({}));
      if (report.conclusion_text) document.getElementById('conclusion-text').value = report.conclusion_text;
      
      loadTemplates();
    } catch(e) { console.error('Error loadData', e); }
  }

  async function loadTemplates() {
    const list = document.getElementById('templates-list');
    try {
      const res = await fetch('/api/conclusion-templates');
      const templates = await res.json();
      list.innerHTML = '';
      if (templates.length === 0) {
        list.innerHTML = '<p class="text-xs text-outline text-center py-4 italic">No hay plantillas guardadas.</p>';
      } else {
        templates.forEach((t, i) => {
          const div = document.createElement('div');
          div.className = 'group p-3 border border-outline-variant rounded-lg hover:border-primary transition-all cursor-pointer bg-surface-container-lowest';
          div.innerHTML = `
            <div class="flex justify-between items-start mb-1">
              <span class="text-xs font-bold text-primary truncate pr-2">${t.name}</span>
              <button class="text-error opacity-0 group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation(); deleteTemplate(${i})">
                <span class="material-symbols-outlined" style="font-size:16px;">delete</span>
              </button>
            </div>
            <p class="text-[10px] text-outline line-clamp-2">${t.text.substring(0, 100)}...</p>
          `;
          div.onclick = () => {
            document.getElementById('conclusion-text').value = t.text;
            showToast('Plantilla aplicada ✓');
          };
          list.appendChild(div);
        });
      }
    } catch(e) { list.innerHTML = '<p class="text-xs text-error text-center py-4">Error al cargar plantillas.</p>'; }
  }

  async function deleteTemplate(index) {
    if (!confirm('¿Eliminar esta plantilla?')) return;
    await fetch(`/api/conclusion-templates/${index}`, { method: 'DELETE' });
    loadTemplates();
    showToast('Plantilla eliminada');
  }

  // Regenerar automático
  document.getElementById('btn-regenerate').onclick = async () => {
    const report = await fetch('/api/report').then(r => r.json()).catch(()=>({}));
    const rt = report.report_type || 'audiometria';
    const res = await fetch(`/api/templates/default?report_type=${rt}`);
    const data = await res.json();
    if (data.conclusion) {
      document.getElementById('conclusion-text').value = data.conclusion;
      showToast('Plantilla regenerada ✓');
      saveAll(true);
    }
  };

  // Listeners para auto-guardado
  document.getElementById('conclusion-text').addEventListener('input', scheduleAutoSave);

  // Diálogo guardar plantilla
  const modal = document.getElementById('modal-template');
  document.getElementById('btn-save-template-dialog').onclick = () => modal.classList.remove('hidden');
  document.getElementById('btn-cancel-modal').onclick = () => modal.classList.add('hidden');
  
  document.getElementById('btn-confirm-save-template').onclick = async () => {
    const name = document.getElementById('template-name').value.trim();
    const text = document.getElementById('conclusion-text').value.trim();
    if (!name || !text) return showToast('Complete el nombre y el texto','error');
    
    await fetch('/api/conclusion-templates', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, text })
    });
    
    modal.classList.add('hidden');
    document.getElementById('template-name').value = '';
    loadTemplates();
    showToast('Plantilla guardada ✓');
  };

  function collectFormData() {
    return {
      conclusion_text: document.getElementById('conclusion-text').value
    };
  }

  window.saveReport = saveAll;
  window.loadData = loadData;
  window.collectFormData = collectFormData;
  window.addEventListener('DOMContentLoaded', loadData);
</script>
</body></html>
