<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Protocolo de Resultados – CAIT Informes</title>
<script src="/static/js/tailwind.js?plugins=forms,container-queries"></script>
<!-- Offline Fonts Enabled -->
<!-- Offline Fonts Enabled -->
<script src="/static/js/ui-components.js"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode:"class",
    theme:{extend:{
      colors:{
        "background":"#fcf9f8","surface":"#fcf9f8",
        "surface-container-low":"#f6f3f2","on-surface":"#1b1c1c","on-surface-variant":"#41493e",
        "outline":"#717a6d","outline-variant":"#c0c9bb",
        "primary":"#00450d","on-primary":"#ffffff","secondary":"#1b6d24","on-secondary":"#ffffff","error":"#ba1a1a"
      },
      spacing:{"lg":"24px"},
      borderRadius:{"DEFAULT":"0.25rem","lg":"0.5rem"},
      fontFamily:{"sans":["Inter","sans-serif"]},
      fontSize:{"headline-lg":["30px",{lineHeight:"38px",fontWeight:"700"}],"body-md":["14px",{lineHeight:"20px"}]}
    }}
  }
</script>
<style>
  *{font-family:'Inter',sans-serif;box-sizing:border-box;}
  .material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;vertical-align:middle;}
  .nav-active{background-color:#eae7e7;color:#00450d;font-weight:700;}
  .nav-item{color:#41493e;}
  .toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;opacity:0;}
  .toast.show{opacity:1;}
  .toast.success{background:#1b5e20;color:#fff;}
  .toast.error{background:#ba1a1a;color:#fff;}
  .drop-zone{border:2px dashed #c0c9bb;border-radius:12px;padding:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
  .drop-zone:hover{border-color:#00450d;background:#f6fef7;}
  .drop-zone.drag-over{border-color:#00450d;background:#e8f5e9;}
</style>
<link rel="stylesheet" href="/static/js/offline-fonts.css">
</head>
<body class="bg-background text-on-surface flex flex-col h-screen overflow-hidden">

<header id="header-container"></header>

<div class="flex flex-1 overflow-hidden">
  <aside id="sidebar-container" style="width:256px;" class="hidden md:flex flex-col bg-surface-container-low border-r border-outline-variant py-4 overflow-y-auto shrink-0"></aside>

  <main class="flex-1 overflow-y-auto p-lg">
    <div class="max-w-5xl mx-auto">
      <div class="mb-8 border-l-4 border-primary pl-5 py-1">
        <h1 class="text-headline-lg text-on-surface">Protocolo de Resultados</h1>
        <p class="text-on-surface-variant text-body-md mt-1">Cargue el PDF con el protocolo de resultados clínicos de los trabajadores.</p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-5">
          <div class="bg-surface border border-outline-variant rounded-xl overflow-hidden">
            <div class="p-4 border-b border-outline-variant bg-surface-container-low flex items-center gap-2">
              <span class="material-symbols-outlined text-primary" style="font-size:20px;">upload_file</span>
              <h2 class="text-xs font-bold text-on-surface uppercase tracking-wider">Subir Protocolo</h2>
            </div>
            <div class="p-5">
              <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <span class="material-symbols-outlined text-outline mb-2" style="font-size:36px;">picture_as_pdf</span>
                <p class="font-bold text-sm text-on-surface">Arrastrar PDFs de Resultados</p>
                <p class="text-xs text-outline mt-1">Soporta selección múltiple · Solo PDF</p>
              </div>
              <input type="file" id="file-input" accept=".pdf" multiple class="hidden"/>
            </div>
          </div>
        </div>

        <div class="lg:col-span-7">
          <div class="bg-surface border border-outline-variant rounded-xl overflow-hidden h-full flex flex-col">
            <div class="p-4 border-b border-outline-variant bg-surface-container-low flex items-center justify-between">
              <h2 class="text-xs font-bold text-on-surface uppercase tracking-wider">Archivo Seleccionado</h2>
              <span id="file-count" class="text-xs text-outline">0 archivos</span>
            </div>
            <div class="flex-1 overflow-y-auto">
              <table class="w-full text-left border-collapse text-sm">
                <thead>
                  <tr class="bg-surface-container-low border-b border-outline-variant">
                    <th class="px-4 py-3 font-bold text-outline uppercase">Archivo</th>
                    <th class="px-4 py-3 font-bold text-outline uppercase text-right">Acción</th>
                  </tr>
                </thead>
                <tbody id="files-tbody" class="divide-y divide-outline-variant">
                  <tr id="empty-row"><td colspan="2" class="px-4 py-10 text-center text-outline">No se ha seleccionado el protocolo.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
  let adjuntos = [];
  let reportType = 'audiometria';

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = `toast ${type} show`;
    setTimeout(()=>t.classList.remove('show'), 2800);
  }

  function renderZonales() {
    const container = document.querySelector('.grid.grid-cols-1.lg\\:grid-cols-12');
    const leftCol = container.querySelector('.lg\\:col-span-5');
    leftCol.innerHTML = '';

    const lowerType = reportType.toLowerCase();
    const isAudio = lowerType.includes('audiometri');
    const isEspiro = lowerType.includes('espirom');
    const isCombined = isAudio && isEspiro;

    if (isAudio || (!isAudio && !isEspiro)) {
      const title = isCombined ? 'Protocolo de Audiometría' : 'Subir Audiogramas';
      leftCol.appendChild(createDropZone('Audiograma', title, 'Arrastrar PDFs de Audiometría'));
    }
    if (isEspiro) {
      const title = isCombined ? 'Protocolo de Espirometría' : 'Subir Espirometrías';
      const mt = (isAudio || (!isAudio && !isEspiro)) ? 'mt-6' : '';
      const div = document.createElement('div');
      div.className = mt;
      div.appendChild(createDropZone('Reporte Espirometría', title, 'Arrastrar PDFs de Espirometría'));
      leftCol.appendChild(div);
    }
  }

  function createDropZone(tipo, title, placeholder) {
    const div = document.createElement('div');
    div.className = 'bg-surface border border-outline-variant rounded-xl overflow-hidden';
    div.innerHTML = `
      <div class="p-4 border-b border-outline-variant bg-surface-container-low flex items-center gap-2">
        <span class="material-symbols-outlined text-primary" style="font-size:20px;">upload_file</span>
        <h2 class="text-xs font-bold text-on-surface uppercase tracking-wider">${title}</h2>
      </div>
      <div class="p-5">
        <div class="drop-zone" id="drop-zone-${tipo.replace(/ /g, '-')}" onclick="document.getElementById('file-input-${tipo.replace(/ /g, '-')}').click()">
          <span class="material-symbols-outlined text-outline mb-2" style="font-size:36px;">picture_as_pdf</span>
          <p class="font-bold text-sm text-on-surface">${placeholder}</p>
          <p class="text-xs text-outline mt-1">Solo PDF</p>
        </div>
        <input type="file" id="file-input-${tipo.replace(/ /g, '-')}" accept=".pdf" multiple class="hidden" onchange="handleFiles(this.files, '${tipo}')"/>
      </div>
    `;
    
    // Add drag and drop listeners
    setTimeout(() => {
      const zone = div.querySelector('.drop-zone');
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => {
        e.preventDefault(); zone.classList.remove('drag-over');
        handleFiles(e.dataTransfer.files, tipo);
      });
    }, 0);

    return div;
  }

  function renderTable() {
    const tbody = document.getElementById('files-tbody');
    const empty = document.getElementById('empty-row');
    
    tbody.querySelectorAll('tr:not(#empty-row)').forEach(r=>r.remove());
    document.getElementById('file-count').textContent = adjuntos.length + ' archivo' + (adjuntos.length!==1?'s':'');
    
    const filtered = adjuntos.filter(a => a.tipo === 'Audiograma' || a.tipo === 'Reporte Espirometría' || a.tipo === 'Protocolo Resultados');

    if (filtered.length === 0) empty.style.display = '';
    else {
      empty.style.display = 'none';
      filtered.forEach((f, i) => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-surface-container-low transition-colors';
        tr.innerHTML = `
          <td class="px-4 py-3">
            <div class="font-medium text-on-surface">${f.name}</div>
            <div class="text-[10px] text-outline uppercase">${f.tipo}</div>
          </td>
          <td class="px-4 py-3 text-right">
            <button class="text-error text-xs font-bold hover:underline" onclick="removeFile('${f.name}')">Quitar</button>
          </td>`;
        tbody.appendChild(tr);
      });
    }
  }

  async function removeFile(name) {
    adjuntos = adjuntos.filter(a => a.name !== name);
    renderTable();
    await autoSave();
  }

  async function handleFiles(files, tipo) {
    for (const f of Array.from(files)) {
      if (!adjuntos.find(a => a.name === f.name)) {
        const formData = new FormData();
        formData.append('file', f);
        try {
          const res = await fetch('/api/upload-attachment', { method: 'POST', body: formData });
          if (res.ok) {
            adjuntos.push({ name: f.name, tipo: tipo });
            showToast(`Subido: ${f.name}`);
          } else {
            const err = await res.json();
            showToast(`Error: ${err.message || f.name}`, 'error');
          }
        } catch(e) { showToast('Error de conexión','error'); }
      }
    }
    renderTable();
    await autoSave();
  }

  async function autoSave() {
    const existing = await (await fetch('/api/report')).json().catch(()=>({})) || {};
    existing.adjuntos = adjuntos;
    await fetch('/api/report', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(existing) });
  }

  async function loadData() {
    const res = await fetch('/api/report');
    if (res.ok) {
      const report = await res.json();
      reportType = (report.report_type || report.type || 'audiometria').toLowerCase();
      if (Array.isArray(report.adjuntos)) {
        adjuntos = report.adjuntos;
      }
      renderZonales();
      renderTable();
    }
  }

  window.saveReport = autoSave;
  window.loadData = loadData;
  window.addEventListener('DOMContentLoaded', loadData);
</script>
</body></html>
